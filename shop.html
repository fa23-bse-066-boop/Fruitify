<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop premium organic fruits and vegetables at Fruitables">
  <title>Shop - Fruitables</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="shop">

  <div id="site-header"></div>

  <section class="page-header">
    <div class="container">
      <h1 class="page-title">Shop</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb justify-content-center">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page">Shop</li>
        </ol>
      </nav>
    </div>
  </section>

  <section class="section-padding">
    <div class="container">
      <div class="row">
        <div class="col-lg-3 mb-4">
          <div class="shop-sidebar">
            <h5>Categories</h5>
            <ul class="category-list">
              <li><label><input type="checkbox" checked> All Products</label></li>
              <li><label><input type="checkbox"> Vegetables</label></li>
              <li><label><input type="checkbox"> Fruits</label></li>
              <li><label><input type="checkbox"> Juice</label></li>
              <li><label><input type="checkbox"> Dried</label></li>
            </ul>
            <div class="price-range">
              <h5>Price Range</h5>
              <input type="range" class="form-range" min="0" max="100" value="50" aria-label="Price range">
              <div class="d-flex justify-content-between mt-2">
                <span>$0</span>
                <span>$100</span>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-9">
          <div class="shop-toolbar">
            <p class="mb-0">Showing <strong>1-16</strong> of <strong>16</strong> results</p>
            <select class="form-select" aria-label="Sort products">
              <option selected>Default sorting</option>
              <option>Price: Low to High</option>
              <option>Price: High to Low</option>
              <option>Newest</option>
            </select>
          </div>
          <div class="row" id="shopProductsGrid"></div>
          <div class="pagination-wrapper d-flex justify-content-center">
            <nav aria-label="Shop pagination">
              <ul class="pagination">
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item"><a class="page-link" href="#"><i class="fas fa-chevron-right"></i></a></li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
