<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Fruitables for support, inquiries, or feedback">
  <title>Contact - Fruitables</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="contact">

  <div id="site-header"></div>

  <section class="page-header">
    <div class="container">
      <h1 class="page-title">Contact</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb justify-content-center">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page">Contact</li>
        </ol>
      </nav>
    </div>
  </section>

  <section class="section-padding">
    <div class="container">
      <div class="row g-4 mb-5">
        <div class="col-lg-4 col-md-4">
          <div class="contact-info-card fade-in">
            <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
            <h5>Address</h5>
            <p>1429 Netus Rd, NY 48247<br>United States</p>
          </div>
        </div>
        <div class="col-lg-4 col-md-4">
          <div class="contact-info-card fade-in">
            <div class="icon"><i class="fas fa-envelope"></i></div>
            <h5>Email Us</h5>
            <p>info@fruitables.com<br>support@fruitables.com</p>
          </div>
        </div>
        <div class="col-lg-4 col-md-4">
          <div class="contact-info-card fade-in">
            <div class="icon"><i class="fas fa-phone-alt"></i></div>
            <h5>Telephone</h5>
            <p>+012 345 67890<br>+012 345 67891</p>
          </div>
        </div>
      </div>

      <div class="row g-5">
        <div class="col-lg-6">
          <form class="contact-form" id="contactForm">
            <h4 class="mb-4">Send Us a Message</h4>
            <div class="row">
              <div class="col-md-6">
                <input type="text" class="form-control" name="name" placeholder="Your Name" required aria-label="Your name">
              </div>
              <div class="col-md-6">
                <input type="email" class="form-control" name="email" placeholder="Your Email" required aria-label="Your email">
              </div>
            </div>
            <input type="text" class="form-control" name="subject" placeholder="Subject" aria-label="Subject">
            <textarea class="form-control" name="message" placeholder="Your Message" required aria-label="Your message"></textarea>
            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </div>
        <div class="col-lg-6">
          <div class="map-placeholder">
            <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=600&h=400&fit=crop" alt="Map location placeholder">
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
